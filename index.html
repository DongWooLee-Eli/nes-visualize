<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NES Visualizations</title>
  <style>
    :root {
      font-family: Inter, "Helvetica Neue", Pretendard, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      background: #f7f7f5;
      color: #171817;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f7f7f5; }
    main { width: min(1120px, calc(100% - 40px)); margin: auto; padding: clamp(72px, 12vw, 140px) 0; }
    h1 { margin: 18px 0 18px; font-size: clamp(46px, 7vw, 72px); font-weight: 650; line-height: 1; letter-spacing: -.055em; }
    nav { display: grid; gap: 14px; }
    a {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 24px;
      align-items: center;
      padding: 26px;
      color: inherit;
      text-decoration: none;
      background: #fff;
      border: 1px solid #dedfdd;
      border-radius: 10px;
      transition: transform .15s ease, border-color .15s ease;
    }
    a:hover, a:focus-visible { transform: translateY(-2px); border-color: #2867f0; outline: none; }
    time { color: #2867f0; font-variant-numeric: tabular-nums; }
    strong { display: block; margin-bottom: 6px; font-size: 20px; }
    span { color: #727773; line-height: 1.5; }
    b { white-space: nowrap; }
    @media (max-width: 640px) {
      a { grid-template-columns: 1fr auto; }
      time { grid-column: 1 / -1; }
      a span { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1>NES VISUALIZATIONS</h1>
    <nav aria-label="날짜별 발표">
      <a href="./260724/">
        <time datetime="2026-07-24">2026.07.24</time>
        <span><strong>High-level Abstraction w/o Domain Description</strong>v1 · v2 · v3 병목 개선 실험</span>
        <b>열기 →</b>
      </a>
    </nav>
  </main>
</body>
</html>

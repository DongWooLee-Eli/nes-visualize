<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NES Visualizations</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1210;
      color: #ecf3ef;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 80% 0%, #173d32, transparent 38%), #0b1210; }
    main { width: min(960px, calc(100% - 40px)); margin: auto; padding: clamp(72px, 12vw, 150px) 0; }
    .kicker { color: #7edbb7; font-size: 12px; font-weight: 800; letter-spacing: .18em; }
    h1 { margin: 16px 0 12px; font-size: clamp(46px, 9vw, 92px); line-height: .96; letter-spacing: -.06em; }
    .intro { max-width: 560px; margin: 0 0 64px; color: #a9b9b1; font-size: 18px; line-height: 1.7; }
    nav { display: grid; gap: 14px; }
    a {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 24px;
      align-items: center;
      padding: 26px;
      color: inherit;
      text-decoration: none;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      transition: transform .15s ease, border-color .15s ease;
    }
    a:hover, a:focus-visible { transform: translateY(-2px); border-color: #7edbb7; outline: none; }
    time { color: #7edbb7; font-variant-numeric: tabular-nums; }
    strong { display: block; margin-bottom: 6px; font-size: 20px; }
    span { color: #91a49a; line-height: 1.5; }
    b { white-space: nowrap; }
    footer { margin-top: 72px; color: #65776e; font-size: 13px; }
    @media (max-width: 640px) {
      a { grid-template-columns: 1fr auto; }
      time { grid-column: 1 / -1; }
      a span { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <p class="kicker">NES VISUALIZATIONS</p>
    <h1>연구 발표<br>아카이브</h1>
    <p class="intro">실험 결과와 분석 자료를 날짜별로 모았습니다. 아래 항목을 선택하면 해당 발표 페이지가 열립니다.</p>
    <nav aria-label="날짜별 발표">
      <a href="./260724/">
        <time datetime="2026-07-24">2026.07.24</time>
        <span><strong>TC2 High-level Abstraction</strong>v1 · v2 · v3 병목 개선 실험</span>
        <b>열기 →</b>
      </a>
    </nav>
    <footer>Dongwoo Lee · NES research visualizations</footer>
  </main>
</body>
</html>
